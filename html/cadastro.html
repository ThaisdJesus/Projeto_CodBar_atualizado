<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/cadastro.css">
    <title>Cadastro</title>
</head>
<body>
    <h1>Cadastro</h1>
    <div class="cadastro">
    <form action="" method="post">
        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" pattern="[0-9]{3}\.[0-9]{3}\.[0-9]{2}" maxlength="14" required>
        <label for="username">Email:</label>
        <input type="email" id="username" name="username" placeholder="digite seu melhor email" required><br><br>
        <label for="password">Senha:</label>
        <input type="password" id="password" name="password" placeholder="senha" required><br><br>
        <button type="submit">Cadastrar</button>
    </form>

    <p>Já tem uma conta? <a href="login.html">Faça login</a></p>
    </div>
</body>
</html>
