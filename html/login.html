<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="shortcut icon" rel="icon" href="/images/logo.favicon.ico.png" type="image/x-icon">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login">
    <h1>Login</h1>
    <form action="" method="post" autocomplete="on">
        <label for="username">User:</label>
        <input type="text" id="username" name="username" placeholder="email/cpf" ><br><br>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" maxlength="8" placeholder="senha" required ><i class="fa-solid fa-eye" id="eye"></i><br>
        
        <button type="submit" onclick="logar(); return false;">Login</button>
    </form> 
    <p>Não tem uma conta? <a href="cadastro.html">Cadastre-se</a></p>
    </div>

    <script src="../js/login.js"></script>
</body>

</html>
